<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PGP Vault Suite</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openpgp/5.11.2/openpgp.min.js"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-sans antialiased p-4 pb-12">

    <header class="max-w-md mx-auto mb-4 border-b border-gray-800 pb-3 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-bold tracking-wider text-emerald-400">🔑 PGP SUITE</h1>
            <p id="key-count" class="text-xs text-gray-500">0 Public | 0 Private Keys</p>
        </div>
        <button onclick="wipeAllData()" class="text-xs bg-red-950/40 hover:bg-red-950 border border-red-900 text-red-400 px-2 py-1 rounded cursor-pointer">Wipe App</button>
    </header>

    <main class="max-w-md mx-auto space-y-4">
        
        <nav class="grid grid-cols-4 gap-1 bg-gray-900 p-1 border border-gray-800 rounded-lg text-xs font-semibold">
            <button onclick="switchTab('tab-verify')" id="btn-tab-verify" class="py-2 text-center rounded bg-emerald-600 text-gray-950 font-bold transition-all cursor-pointer">Verify</button>
            <button onclick="switchTab('tab-encrypt')" id="btn-tab-encrypt" class="py-2 text-center rounded text-gray-400 hover:text-white transition-all cursor-pointer">Encrypt</button>
            <button onclick="switchTab('tab-decrypt')" id="btn-tab-decrypt" class="py-2 text-center rounded text-gray-400 hover:text-white transition-all cursor-pointer">Decrypt</button>
            <button onclick="switchTab('tab-keys')" id="btn-tab-keys" class="py-2 text-center rounded text-gray-400 hover:text-white transition-all cursor-pointer">Keys</button>
        </nav>

        <section id="alert-box" class="hidden p-3 rounded-lg font-mono text-xs font-bold border break-words"></section>

        <section id="tab-verify" class="tab-content space-y-3">
            <div class="bg-gray-900 border border-gray-800 rounded-xl p-4 shadow-xl">
                <h2 class="text-xs font-semibold tracking-wide text-gray-400 mb-2">VERIFY CLEARTEXT SIGNATURE</h2>
                <textarea id="verify-input" rows="8" class="w-full bg-gray-950 border border-gray-800 rounded-lg p-2 font-mono text-xs text-emerald-500 focus:outline-none placeholder-gray-700" placeholder="Paste -----BEGIN PGP SIGNED MESSAGE----- block..."></textarea>
                <button onclick="handleVerify()" class="w-full mt-2 bg-emerald-600 hover:bg-emerald-500 text-gray-950 font-bold py-2 rounded-lg text-xs transition-colors cursor-pointer">Run Signature Verification</button>
            </div>
            <div id="verify-result-box" class="hidden bg-gray-900 border border-gray-800 rounded-xl p-4">
                <label class="text-[10px] text-gray-500 block mb-1 font-mono">EXTRACTED CLEAN TEXT:</label>
                <div id="verify-output-text" class="w-full bg-gray-950 border border-gray-800 rounded-lg p-2 font-mono text-xs text-gray-300 whitespace-pre-wrap break-words"></div>
            </div>
        </section>

        <section id="tab-encrypt" class="tab-content hidden space-y-3">
            <div class="bg-gray-900 border border-gray-800 rounded-xl p-4 shadow-xl space-y-3">
                <h2 class="text-xs font-semibold tracking-wide text-gray-400">ENCRYPT MESSAGE</h2>
                <div>
                    <label class="text-[10px] text-gray-500 block mb-1 font-mono">RECIPIENT PUBLIC KEY:</label>
                    <select id="encrypt-key-select" class="w-full bg-gray-950 border border-gray-800 rounded-lg p-2 font-mono text-xs text-gray-300 focus:outline-none"></select>
                </div>
                <div>
                    <label class="text-[10px] text-gray-500 block mb-1 font-mono">RAW PLAINTEXT MESSAGE:</label>
                    <textarea id="encrypt-message-input" rows="5" class="w-full bg-gray-950 border border-gray-800 rounded-lg p-2 font-mono text-xs text-emerald-500 focus:outline-none placeholder-gray-700" placeholder="Type secret message here..."></textarea>
                </div>
                <button onclick="handleEncrypt()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-gray-950 font-bold py-2 rounded-lg text-xs transition-colors cursor-pointer">Encrypt & Armor Text</button>
            </div>
            <div id="encrypt-result-box" class="hidden bg-gray-900 border border-gray-800 rounded-xl p-4">
                <label class="text-[10px] text-gray-500 block mb-1 font-mono">ARMORED CIPHERTEXT:</label>
                <textarea id="encrypt-output-text" rows="8" readonly class="w-full bg-gray-950 border border-gray-800 rounded-lg p-2 font-mono text-xs text-gray-400 focus:outline-none select-all"></textarea>
            </div>
        </section>

        <section id="tab-decrypt" class="tab-content hidden space-y-3">
            <div class="bg-gray-900 border border-gray-800 rounded-xl p-4 shadow-xl space-y-3">
                <h2 class="text-xs font-semibold tracking-wide text-gray-400">DECRYPT MESSAGE</h2>
                <textarea id="decrypt-input" rows="6" class="w-full bg-gray-950 border border-gray-800 rounded-lg p-2 font-mono text-xs text-emerald-500 focus:outline-none placeholder-gray-700" placeholder="Paste encrypted -----BEGIN PGP MESSAGE----- block here..."></textarea>
                <div>
                    <label class="text-[10px] text-gray-500 block mb-1 font-mono">YOUR DECRYPTION PRIVATE KEY PASSPHRASE:</label>
                    <input type="password" id="decrypt-passphrase" class="w-full bg-gray-950 border border-gray-800 rounded-lg p-2 font-mono text-xs text-gray-300 focus:outline-none" placeholder="Enter key password if set">
                </div>
                <button onclick="handleDecrypt()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-gray-950 font-bold py-2 rounded-lg text-xs transition-colors cursor-pointer">Decrypt Payload</button>
            </div>
            <div id="decrypt-result-box" class="hidden bg-gray-900 border border-gray-800 rounded-xl p-4">
                <label class="text-[10px] text-gray-500 block mb-1 font-mono">DECRYPTED PLAINTEXT:</label>
                <div id="decrypt-output-text" class="w-full bg-gray-950 border border-gray-800 rounded-lg p-2 font-mono text-xs text-gray-200 whitespace-pre-wrap break-words"></div>
            </div>
        </section>

        <section id="tab-keys" class="tab-content hidden space-y-4">
            <div class="bg-gray-900 border border-gray-800 rounded-xl p-4 shadow-xl space-y-3">
                <h2 class="text-xs font-semibold tracking-wide text-gray-400">GENERATE NEW KEY PAIR</h2>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="text-[10px] text-gray-500 block mb-1 font-mono">NAME / ID:</label>
                        <input type="text" id="gen-name" value="Anon User" class="w-full bg-gray-950 border border-gray-800 rounded-lg p-2 font-mono text-xs text-gray-300 focus:outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-500 block mb-1 font-mono">PASSPHRASE (OPTIONAL):</label>
                        <input type="password" id="gen-pass" class="w-full bg-gray-950 border border-gray-800 rounded-lg p-2 font-mono text-xs text-gray-300 focus:outline-none" placeholder="None">
                    </div>
                </div>
                <button onclick="generateKeyPair()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-gray-950 font-bold py-2 rounded-lg text-xs transition-colors cursor-pointer">Generate RSA 2048-bit Key Pair</button>
            </div>

            <div class="bg-gray-900 border border-gray-800 rounded-xl p-4 shadow-xl space-y-2">
                <h2 class="text-xs font-semibold tracking-wide text-gray-400">IMPORT EXTERNAL KEYS</h2>
                <textarea id="key-import-input" rows="4" class="w-full bg-gray-950 border border-gray-800 rounded-lg p-2 font-mono text-xs text-emerald-500 focus:outline-none placeholder-gray-700" placeholder="Paste any standard Armored Public or Private Key block..."></textarea>
                <button onclick="importKey()" class="w-full bg-gray-800 hover:bg-gray-700 text-gray-200 py-2 rounded-lg text-xs font-medium transition-colors cursor-pointer">Parse & Import Key</button>
            </div>

            <div class="bg-gray-900 border border-gray-800 rounded-xl p-4 shadow-xl">
                <h2 class="text-xs font-semibold tracking-wide text-gray-400 mb-3">LOCAL STORAGE KEYRING</h2>
                <div id="keyring-list" class="space-y-3 divide-y divide-gray-800"></div>
            </div>
        </section>

    </main>

    <script>
        // Clean database migration patch handling format changes safely
        let rawDB = localStorage.getItem('pgp_suite_db');
        let db = { publicKeys: {}, privateKeys: {} };
        
        try {
            if (rawDB) {
                let parsed = JSON.parse(rawDB);
                if (parsed && parsed.publicKeys && parsed.privateKeys) {
                    db = parsed;
                }
            }
        } catch(e) {
            console.error("DB Initialization Reset required", e);
        }

        function showAlert(type, text) {
            const el = document.getElementById('alert-box');
            el.classList.remove('hidden', 'bg-emerald-950', 'border-emerald-700', 'text-emerald-400', 'bg-red-950', 'border-red-700', 'text-red-400');
            if (type === 'success') {
                el.className = "p-3 rounded-lg font-mono text-xs font-bold border break-words bg-emerald-950 border-emerald-700 text-emerald-400";
                el.innerText = `🟢 ${text}`;
            } else {
                el.className = "p-3 rounded-lg font-mono text-xs font-bold border break-words bg-red-950 border-red-700 text-red-400";
                el.innerText = `🔴 ${text}`;
            }
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
            
            document.querySelectorAll('nav button').forEach(btn => {
                btn.className = "py-2 text-center rounded text-gray-400 hover:text-white transition-all cursor-pointer";
            });
            document.getElementById(`btn-${tabId}`).className = "py-2 text-center rounded bg-emerald-600 text-gray-950 font-bold transition-all cursor-pointer";
            document.getElementById('alert-box').classList.add('hidden');
            
            if (tabId === 'tab-encrypt') populateEncryptDropdown();
            if (tabId === 'tab-keys') renderKeyringList();
        }

        function syncDB() {
            localStorage.setItem('pgp_suite_db', JSON.stringify(db));
            const publicCount = Object.keys(db.publicKeys).length;
            const privateCount = Object.keys(db.privateKeys).length;
            document.getElementById('key-count').innerText = `${publicCount} Public | ${privateCount} Private Keys`;
        }

        // ================= CRYPTO OPS =================

        async function generateKeyPair() {
            try {
                showAlert('success', 'Generating key pair securely (this can take seconds)...');
                
                const name = document.getElementById('gen-name').value || 'Anon';
                const passphrase = document.getElementById('gen-pass').value || undefined;

                const { privateKey, publicKey } = await openpgp.generateKey({
                    type: 'rsa',
                    rsaBits: 2048,
                    userIDs: [{ name: name }],
                    passphrase: passphrase
                });

                const parsedPubKey = await openpgp.readKey({ armoredKey: publicKey });
                const keyID = parsedPubKey.getKeyID().toHex().toUpperCase();

                db.publicKeys[keyID] = { armored: publicKey, label: `${name} (Public)` };
                db.privateKeys[keyID] = { armored: privateKey, label: `${name} (Private)` };
                
                syncDB();
                switchTab('tab-keys');
                showAlert('success', `Generated & Saved Key Pair ID: 0x${keyID}`);
            } catch(e) {
                showAlert('error', e.message);
            }
        }

        async function importKey() {
            try {
                const raw = document.getElementById('key-import-input').value.trim();
                if (!raw) return showAlert('error', 'Paste data first');

                if (raw.includes('-----BEGIN PGP PUBLIC KEY BLOCK-----')) {
                    const key = await openpgp.readKey({ armoredKey: raw });
                    const id = key.getKeyID().toHex().toUpperCase();
                    const name = prompt("Enter a label for this public key:", "Imported Contact Key") || id;
                    db.publicKeys[id] = { armored: raw, label: name };
                    showAlert('success', `Imported Public Key: 0x${id}`);
                } else if (raw.includes('-----BEGIN PGP PRIVATE KEY BLOCK-----')) {
                    const key = await openpgp.readPrivateKey({ armoredKey: raw });
                    const id = key.getKeyID().toHex().toUpperCase();
                    const name = prompt("Enter a label for this private key:", "My Personal Key") || id;
                    db.privateKeys[id] = { armored: raw, label: name };
                    showAlert('success', `Imported Private Key: 0x${id}`);
                } else {
                    return showAlert('error', 'Unrecognized key armor markers.');
                }
                document.getElementById('key-import-input').value = '';
                syncDB();
                renderKeyringList();
            } catch(e) {
                showAlert('error', `Import Error: ${e.message}`);
            }
        }

        async function handleVerify() {
            try {
                const input = document.getElementById('verify-input').value.trim();
                const resultBox = document.getElementById('verify-result-box');
                resultBox.classList.add('hidden');

                if(!input.includes('-----BEGIN PGP SIGNED MESSAGE-----')) {
                    return showAlert('error', 'Not a cleartext signed message block.');
                }

                const cleartextMessage = await openpgp.readCleartextMessage({ cleartextMessage: input });
                const signers = cleartextMessage.getSigningKeyIDs().map(id => id.toHex().toUpperCase());
                
                let pubKeyObj = null;
                let signerLabel = "Unknown Identity";
                for (let id of signers) {
                    if (db.publicKeys[id]) {
                        pubKeyObj = await openpgp.readKey({ armoredKey: db.publicKeys[id].armored });
                        signerLabel = db.publicKeys[id].label;
                        break;
                    }
                }

                if (!pubKeyObj) {
                    return showAlert('error', `Signed by Key ID: 0x${signers[0] || 'Unknown'}. You must import their Public Key first.`);
                }

                const verificationResult = await openpgp.verify({
                    message: cleartextMessage,
                    verificationKeys: pubKeyObj
                });

                await verificationResult.signatures[0].verified;
                showAlert('success', `Signature Verified from "${signerLabel}"`);
                resultBox.classList.remove('hidden');
                document.getElementById('verify-output-text').innerText = cleartextMessage.getText();
            } catch(e) {
                showAlert('error', `Verification Rejected: ${e.message}`);
            }
        }

        async function handleEncrypt() {
            try {
                const keyID = document.getElementById('encrypt-key-select').value;
                const text = document.getElementById('encrypt-message-input').value.trim();
                const resBox = document.getElementById('encrypt-result-box');
                resBox.classList.add('hidden');

                if (!keyID || !text) return showAlert('error', 'Select target key and ensure message isn\'t blank');

                const pubKey = await openpgp.readKey({ armoredKey: db.publicKeys[keyID].armored });
                const encrypted = await openpgp.encrypt({
                    message: await openpgp.createMessage({ text: text }),
                    encryptionKeys: pubKey
                });

                resBox.classList.remove('hidden');
                document.getElementById('encrypt-output-text').value = encrypted;
                showAlert('success', 'Ciphertext generated successfully');
            } catch(e) {
                showAlert('error', e.message);
            }
        }

        async function handleDecrypt() {
            try {
                const input = document.getElementById('decrypt-input').value.trim();
                const pass = document.getElementById('decrypt-passphrase').value;
                const resBox = document.getElementById('decrypt-result-box');
                resBox.classList.add('hidden');

                if (!input.includes('-----BEGIN PGP MESSAGE-----')) return showAlert('error', 'Invalid encrypted payload format');

                const message = await openpgp.readMessage({ armoredMessage: input });
                const encryptionIds = message.getEncryptionKeyIDs().map(id => id.toHex().toUpperCase());

                let privateKeyObj = null;
                for (let id of encryptionIds) {
                    if (db.privateKeys[id]) {
                        privateKeyObj = await openpgp.readPrivateKey({ armoredKey: db.privateKeys[id].armored });
                        break;
                    }
                }

                if (!privateKeyObj) return showAlert('error', 'Matching Private Key not found.');

                if (privateKeyObj.isEncrypted()) {
                    privateKeyObj = await openpgp.decryptKey({ privateKey: privateKeyObj, passphrase: pass });
                }

                const { data: decrypted } = await openpgp.decrypt({
                    message,
                    decryptionKeys: privateKeyObj
                });

                resBox.classList.remove('hidden');
                document.getElementById('decrypt-output-text').innerText = decrypted;
                showAlert('success', 'Payload decrypted safely');
            } catch(e) {
                showAlert('error', `Decryption Failed: ${e.message}`);
            }
        }

        // ================= DOM INTERACTION =================

        function populateEncryptDropdown() {
            const select = document.getElementById('encrypt-key-select');
            select.innerHTML = '';
            Object.keys(db.publicKeys).forEach(id => {
                const opt = document.createElement('option');
                opt.value = id;
                opt.innerText = `${db.publicKeys[id].label} [0x${id.substring(0,8)}]`;
                select.appendChild(opt);
            });
        }

        function renderKeyringList() {
            const container = document.getElementById('keyring-list');
            container.innerHTML = '';
            
            const renderRows = (collection, typeStr) => {
                Object.keys(collection).forEach(id => {
                    const row = document.createElement('div');
                    row.className = "pt-2 pb-1 text-xs flex justify-between items-start";
                    row.innerHTML = `
                        <div>
