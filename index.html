<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PGP Vault Suite</title>
    <link rel="manifest" href="manifest.json">
    
    <style>
        body { background-color: #020617; color: #f3f4f6; font-family: sans-serif; padding: 16px; margin: 0; }
        .max-w-md { max-width: 28rem; margin-left: auto; margin-right: auto; }
        .flex { display: flex; } .justify-between { justify-content: space-between; } .items-center { align-items: center; }
        .grid { display: grid; } .grid-cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); } .gap-1 { gap: 4px; }
        .bg-slate-900 { background-color: #0f172a; } .border { border: 1px solid #1e293b; } .rounded-lg { border-radius: 8px; }
        .p-1 { padding: 4px; } .py-2 { padding-top: 8px; padding-bottom: 8px; } .text-center { text-align: center; }
        .bg-emerald-600 { background-color: #059669; } .text-slate-950 { color: #020617; } .font-bold { font-weight: 700; }
        .hidden { display: none !important; } .space-y-4 > * + * { margin-top: 16px; } .space-y-3 > * + * { margin-top: 12px; }
        .bg-slate-950 { background-color: #020617; } .w-full { width: 100%; } .p-2 { padding: 8px; } .rounded-xl { border-radius: 12px; }
        .font-mono { font-family: monospace; } .text-xs { font-size: 12px; } .text-emerald-400 { color: #34d399; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/src/index.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openpgp/5.11.2/openpgp.min.js"></script>
</head>
<body>

    <header class="max-w-md pb-3 mb-4 border-b border-slate-800 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-bold text-emerald-400" style="font-size: 20px; margin: 0;">🔑 PGP SUITE</h1>
            <p id="key-count" class="text-xs" style="color: #64748b; margin: 4px 0 0 0;">Initializing App...</p>
        </div>
        <button onclick="wipeAllData()" style="background-color: rgba(69, 10, 10, 0.4); border: 1px solid #7f1d1d; color: #f87171; font-size: 12px; padding: 4px 8px; border-radius: 4px; cursor: pointer;">Wipe App</button>
    </header>

    <main class="max-w-md space-y-4">
        
        <nav class="grid grid-cols-4 gap-1 bg-slate-900 p-1 border border-slate-800 rounded-lg text-xs" style="font-weight: 600;">
            <button onclick="switchTab('tab-verify')" id="btn-tab-verify" class="py-2 text-center rounded bg-emerald-600 text-slate-950 font-bold cursor-pointer">Verify</button>
            <button onclick="switchTab('tab-encrypt')" id="btn-tab-encrypt" class="py-2 text-center rounded style-inactive cursor-pointer" style="color: #94a3b8; border: none; background: transparent;">Encrypt</button>
            <button onclick="switchTab('tab-decrypt')" id="btn-tab-decrypt" class="py-2 text-center rounded style-inactive cursor-pointer" style="color: #94a3b8; border: none; background: transparent;">Decrypt</button>
            <button onclick="switchTab('tab-keys')" id="btn-tab-keys" class="py-2 text-center rounded style-inactive cursor-pointer" style="color: #94a3b8; border: none; background: transparent;">Keys</button>
        </nav>

        <section id="alert-box" class="hidden p-3 rounded-lg font-mono text-xs font-bold border" style="word-break: break-all;"></section>

        <section id="tab-verify" class="tab-content space-y-3">
            <div class="bg-slate-900 border border-slate-800 rounded-xl p-4">
                <h2 class="text-xs font-semibold" style="color: #94a3b8; margin-top: 0; margin-bottom: 8px;">VERIFY CLEARTEXT SIGNATURE</h2>
                <textarea id="verify-input" rows="8" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2 font-mono text-xs text-emerald-400" style="outline: none;" placeholder="Paste -----BEGIN PGP SIGNED MESSAGE----- block..."></textarea>
                <button onclick="handleVerify()" class="w-full mt-2 bg-emerald-600 text-slate-950 font-bold py-2 rounded-lg text-xs cursor-pointer" style="border: none; margin-top: 8px;">Run Signature Verification</button>
            </div>
            <div id="verify-result-box" class="hidden bg-slate-900 border border-slate-800 rounded-xl p-4">
                <label class="font-mono" style="font-size: 10px; color: #64748b; display: block; margin-bottom: 4px;">EXTRACTED CLEAN TEXT:</label>
                <div id="verify-output-text" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2 font-mono text-xs text-gray-300" style="white-space: pre-wrap; word-break: break-all;"></div>
            </div>
        </section>

        <section id="tab-encrypt" class="tab-content hidden space-y-3">
            <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 space-y-3">
                <h2 class="text-xs font-semibold" style="color: #94a3b8; margin: 0;">ENCRYPT MESSAGE</h2>
                <div>
                    <label class="font-mono" style="font-size: 10px; color: #64748b; display: block; margin-bottom: 4px;">RECIPIENT PUBLIC KEY:</label>
                    <select id="encrypt-key-select" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2 font-mono text-xs text-gray-300" style="outline: none;"></select>
                </div>
                <div>
                    <label class="font-mono" style="font-size: 10px; color: #64748b; display: block; margin-bottom: 4px;">RAW PLAINTEXT MESSAGE:</label>
                    <textarea id="encrypt-message-input" rows="5" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2 font-mono text-xs text-emerald-400" style="outline: none;" placeholder="Type secret message here..."></textarea>
                </div>
                <button onclick="handleEncrypt()" class="w-full bg-emerald-600 text-slate-950 font-bold py-2 rounded-lg text-xs cursor-pointer" style="border: none;">Encrypt & Armor Text</button>
            </div>
            <div id="encrypt-result-box" class="hidden bg-slate-900 border border-slate-800 rounded-xl p-4">
                <label class="font-mono" style="font-size: 10px; color: #64748b; display: block; margin-bottom: 4px;">ARMORED CIPHERTEXT:</label>
                <textarea id="encrypt-output-text" rows="8" readonly class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2 font-mono text-xs" style="color: #94a3b8; outline: none;"></textarea>
            </div>
        </section>

        <section id="tab-decrypt" class="tab-content hidden space-y-3">
            <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 space-y-3">
                <h2 class="text-xs font-semibold" style="color: #94a3b8; margin: 0;">DECRYPT MESSAGE</h2>
                <textarea id="decrypt-input" rows="6" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2 font-mono text-xs text-emerald-400" style="outline: none;" placeholder="Paste encrypted -----BEGIN PGP MESSAGE----- block here..."></textarea>
                <div>
                    <label class="font-mono" style="font-size: 10px; color: #64748b; display: block; margin-bottom: 4px;">YOUR DECRYPTION KEY PASSPHRASE:</label>
                    <input type="password" id="decrypt-passphrase" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2 font-mono text-xs text-gray-300" style="outline: none;" placeholder="Enter key password if set">
                </div>
                <button onclick="handleDecrypt()" class="w-full bg-emerald-600 text-slate-950 font-bold py-2 rounded-lg text-xs cursor-pointer" style="border: none;">Decrypt Payload</button>
            </div>
            <div id="decrypt-result-box" class="hidden bg-slate-900 border border-slate-800 rounded-xl p-4">
                <label class="font-mono" style="font-size: 10px; color: #64748b; display: block; margin-bottom: 4px;">DECRYPTED PLAINTEXT:</label>
                <div id="decrypt-output-text" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2 font-mono text-xs text-gray-200" style="white-space: pre-wrap; word-break: break-all;"></div>
            </div>
        </section>

        <section id="tab-keys" class="tab-content hidden space-y-4">
            <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 space-y-3">
                <h2 class="text-xs font-semibold" style="color: #94a3b8; margin: 0;">GENERATE NEW KEY PAIR</h2>
                <div style="display: flex; gap: 8px;">
                    <div style="flex: 1;">
                        <label class="font-mono" style="font-size: 10px; color: #64748b; display: block; margin-bottom: 4px;">NAME / ID:</label>
                        <input type="text" id="gen-name" value="Anon User" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2 font-mono text-xs text-gray-300" style="outline: none;">
                    </div>
                    <div style="flex: 1;">
                        <label class="font-mono" style="font-size: 10px; color: #64748b; display: block; margin-bottom: 4px;">PASSPHRASE:</label>
                        <input type="password" id="gen-pass" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2 font-mono text-xs text-gray-300" style="outline: none;" placeholder="Optional">
                    </div>
                </div>
                <button onclick="generateKeyPair()" class="w-full bg-emerald-600 text-slate-950 font-bold py-2 rounded-lg text-xs cursor-pointer" style="border: none;">Generate RSA 2048-bit Key Pair</button>
            </div>

            <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 space-y-2">
                <h2 class="text-xs font-semibold" style="color: #94a3b8; margin: 0 0 4px 0;">IMPORT EXTERNAL KEYS</h2>
                <textarea id="key-import-input" rows="4" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2 font-mono text-xs text-emerald-400" style="outline: none;" placeholder="Paste any standard Armored Public or Private Key block..."></textarea>
                <button onclick="importKey()" class="w-full bg-slate-800 text-gray-200 py-2 rounded-lg text-xs font-medium cursor-pointer" style="border: none; background-color: #1e293b;">Parse & Import Key</button>
            </div>

            <div class="bg-slate-900 border border-slate-800 rounded-xl p-4">
                <h2 class="text-xs font-semibold" style="color: #94a3b8; margin: 0 0 12px 0;">LOCAL STORAGE KEYRING</h2>
                <div id="keyring-list" style="display: flex; flex-direction: column; gap: 12px;"></div>
            </div>
        </section>

    </main>

    <script>
        let db = { publicKeys: {}, privateKeys: {} };

        function checkEngine() {
            if (typeof openpgp === 'undefined') {
                showAlert('error', 'Cryptographic engine failed to load over CDN. Switch your browser connection or check network filters.');
                return false;
            }
            return true;
        }

        function showAlert(type, text) {
            const el = document.getElementById('alert-box');
            el.classList.remove('hidden');
            if (type === 'success') {
                el.style.backgroundColor = '#064e3b'; el.style.borderColor = '#047857'; el.style.color = '#34d399';
                el.innerText = `🟢 ${text}`;
            } else {
                el.style.backgroundColor = '#4c0519'; el.style.borderColor = '#b91c1c'; el.style.color = '#f87171';
                el.innerText = `🔴 ${text}`;
            }
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
            
            document.querySelectorAll('nav button').forEach(btn => {
                btn.className = "py-2 text-center rounded cursor-pointer";
                btn.style.backgroundColor = "transparent";
                btn.style.color = "#94a3b8";
                btn.style.fontWeight = "600";
            });
            
            const activeBtn = document.getElementById(`btn-${tabId}`);
            activeBtn.style.backgroundColor = "#059669";
            activeBtn.style.color = "#020617";
            activeBtn.style.fontWeight = "700";
            
            document.getElementById('alert-box').classList.add('hidden');
            
            if (tabId === 'tab-encrypt') populateEncryptDropdown();
            if (tabId === 'tab-keys') renderKeyringList();
        }

        function syncDB() {
            try {
                localStorage.setItem('pgp_suite_db', JSON.stringify(db));
            } catch(e) {
                console.error("Storage save rejected", e);
            }
            const publicCount = Object.keys(db.publicKeys).length;
            const privateCount = Object.keys(db.privateKeys).length;
            document.getElementById('key-count').innerText = `${publicCount} Public | ${privateCount} Private Keys`;
        }

        async function generateKeyPair() {
            if (!checkEngine()) return;
            try {
                showAlert('success', 'Generating key pair (takes a few seconds)...');
                const name = document.getElementById('gen-name').value || 'Anon';
                const passphrase = document.getElementById('gen-pass').value || undefined;

                const { privateKey, publicKey } = await openpgp.generateKey({
                    type: 'rsa',
                    rsaBits: 2048,
                    userIDs: [{ name: name }],
                    passphrase: passphrase
                });

                const parsedPubKey = await openpgp.readKey({ armoredKey: publicKey });
                const keyID = parsedPubKey.getKeyID().toHex().toUpperCase();

                db.publicKeys[keyID] = { armored: publicKey, label: `${name} (Public)` };
                db.privateKeys[keyID] = { armored: privateKey, label: `${name} (Private)` };
                
                syncDB();
                switchTab('tab-keys');
                showAlert('success', `Generated Key pair: 0x${keyID}`);
            } catch(e) {
                showAlert('error', e.message);
            }
        }

        async function importKey() {
            if (!checkEngine()) return;
            try {
                const raw = document.getElementById('key-import-input').value.trim();
                if (!raw) return showAlert('error', 'Paste data first');

                if (raw.includes('-----BEGIN PGP PUBLIC KEY BLOCK-----')) {
                    const key = await openpgp.readKey({ armoredKey: raw });
                    const id = key.getKeyID().toHex().toUpperCase();
                    const name = prompt("Enter a label for this public key:", "Imported Contact Key") || id;
                    db.publicKeys[id] = { armored: raw, label: name };
                    showAlert('success', `Imported Public Key: 0x${id}`);
                } else if (raw.includes('-----BEGIN PGP PRIVATE KEY BLOCK-----')) {
                    const key = await openpgp.readPrivateKey({ armoredKey: raw });
                    const id = key.getKeyID().toHex().toUpperCase();
                    const name = prompt("Enter a label for this private key:", "My Personal Key") || id;
                    db.privateKeys[id] = { armored: raw, label: name };
                    showAlert('success', `Imported Private Key: 0x${id}`);
                } else {
                    return showAlert('error', 'Unrecognized PGP armored key markers.');
                }
                document.getElementById('key-import-input').value = '';
                syncDB();
                renderKeyringList();
            } catch(e) {
                showAlert('error', `Import Failed: ${e.message}`);
            }
        }

        async function handleVerify() {
            if (!checkEngine()) return;
            try {
                const input = document.getElementById('verify-input').value.trim();
                const resultBox = document.getElementById('verify-result-box');
                resultBox.classList.add('hidden');

                if(!input.includes('-----BEGIN PGP SIGNED MESSAGE-----')) {
                    return showAlert('error', 'Paste an actual -----BEGIN PGP SIGNED MESSAGE----- block here.');
                }

                const cleartextMessage = await openpgp.readCleartextMessage({ cleartextMessage: input });
                const signers = cleartextMessage.getSigningKeyIDs().map(id => id.toHex().toUpperCase());
                
                let pubKeyObj = null;
                let signerLabel = "Unknown Identity";
                for (let id of signers) {
                    if (db.publicKeys[id]) {
                        pubKeyObj = await openpgp.readKey({ armoredKey: db.publicKeys[id].armored });
                        signerLabel = db.publicKeys[id].label;
                        break;
                    }
                }

                if (!pubKeyObj) {
                    return showAlert('error', `Signed by Key ID: 0x${signers[0] || 'Unknown'}. Import their Public Key in the "Keys" tab first.`);
                }

                const verificationResult = await openpgp.verify({
                    message: cleartextMessage,
                    verificationKeys: pubKeyObj
                });

                await verificationResult.signatures[0].verified;
                showAlert('success', `Signature Verified from "${signerLabel}"`);
                resultBox.classList.remove('hidden');
                document.getElementById('verify-output-text').innerText = cleartextMessage.getText();
            } catch(e) {
                showAlert('error', `Verification Rejected: ${e.message}`);
            }
        }

        async function handleEncrypt() {
            if (!checkEngine()) return;
            try {
                const keyID = document.getElementById('encrypt-key-select').value;
                const text = document.getElementById('encrypt-message-input').value.trim();
                const resBox = document.getElementById('encrypt-result-box');
                resBox.classList.add('hidden');

                if (!keyID || !text) return showAlert('error', 'Select target key and write a message');

                const pubKey = await openpgp.readKey({ armoredKey: db.publicKeys[keyID].armored });
                const encrypted = await openpgp.encrypt({
                    message: await openpgp.createMessage({ text: text }),
                    encryptionKeys: pubKey
                });

                resBox.classList.remove('hidden');
                document.getElementById('encrypt-output-text').value = encrypted;
                showAlert('success', 'Ciphertext generated successfully');
            } catch(e) {
                showAlert('error', e.message);
            }
        }

        async function handleDecrypt() {
            if (!checkEngine()) return;
            try {
                const input = document.getElementById('decrypt-input').value.trim();
                const pass = document.getElementById('decrypt-passphrase').value;
                const resBox = document.getElementById('decrypt-result-box');
                resBox.classList.add('hidden');

                if (!input.includes('-----BEGIN PGP MESSAGE-----')) return showAlert('error', 'Invalid encrypted payload format');

                const message = await openpgp.readMessage({ armoredMessage: input });
                const encryptionIds = message.getEncryptionKeyIDs().map(id => id.toHex().toUpperCase());

                let privateKeyObj = null;
                for (let id of encryptionIds) {
                    if (db.privateKeys[id]) {
                        privateKeyObj = await openpgp.readPrivateKey({ armoredKey: db.privateKeys[id].armored });
                        break;
                    }
                }

                if
