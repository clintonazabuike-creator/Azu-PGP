<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PGP Vault</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openpgp/5.11.2/openpgp.min.js"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-sans antialiased p-4 pb-12">

    <header class="max-w-md mx-auto flex justify-between items-center mb-6 border-b border-gray-800 pb-3">
        <div>
            <h1 class="text-xl font-bold tracking-wider text-emerald-400">🔑 PGP VAULT</h1>
            <p id="key-count" class="text-xs text-gray-500">0 keys loaded locally</p>
        </div>
    </header>

    <main class="max-w-md mx-auto space-y-6">
        
        <section class="bg-gray-900 border border-gray-800 rounded-xl p-4 shadow-xl">
            <h2 class="text-sm font-semibold tracking-wide text-gray-400 mb-3">INPUT TERMINAL</h2>
            
            <textarea id="main-input" rows="10" 
                class="w-full bg-gray-950 border border-gray-800 rounded-lg p-3 font-mono text-xs text-emerald-500 focus:outline-none focus:border-emerald-500 transition-colors placeholder-gray-700"
                placeholder="Paste an Armored Public Key OR a -----BEGIN PGP SIGNED MESSAGE----- block here..."></textarea>
            
            <div class="grid grid-cols-2 gap-3 mt-3">
                <button onclick="processInput()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-gray-950 font-bold py-2 px-4 rounded-lg text-sm transition-colors cursor-pointer">
                    Process Input
                </button>
                <button onclick="clearInput()" class="w-full bg-gray-800 hover:bg-gray-700 text-gray-300 font-medium py-2 px-4 rounded-lg text-sm transition-colors cursor-pointer">
                    Clear Input
                </button>
            </div>
        </section>

        <section id="output-panel" class="hidden bg-gray-900 border border-gray-800 rounded-xl p-4 shadow-xl">
            <h2 class="text-sm font-semibold tracking-wide text-gray-400 mb-3">OUTPUT LOG</h2>
            
            <div id="status-badge" class="mb-3 p-3 rounded-lg font-mono text-xs font-bold border"></div>
            
            <div id="decrypted-box" class="hidden">
                <label class="text-xs text-gray-500 block mb-1 font-mono">EXTRACTED TEXT:</label>
                <div id="output-text" class="w-full bg-gray-950 border border-gray-800 rounded-lg p-3 font-mono text-xs text-gray-300 break-words whitespace-pre-wrap"></div>
            </div>
        </section>

    </main>

    <script>
        // Local state initialization pulling keys from phone's browser cache
        let keyRing = JSON.parse(localStorage.getItem('pgp_vault_keys')) || {};

        function updateKeyCount() {
            const count = Object.keys(keyRing).length;
            document.getElementById('key-count').innerText = `${count} key(s) loaded locally`;
        }

        function clearInput() {
            document.getElementById('main-input').value = '';
            document.getElementById('output-panel').classList.add('hidden');
        }

        function showStatus(type, message, bodyText = '') {
            const panel = document.getElementById('output-panel');
            const badge = document.getElementById('status-badge');
            const decryptBox = document.getElementById('decrypted-box');
            const outputText = document.getElementById('output-text');

            panel.classList.remove('hidden');
            decryptBox.classList.add('hidden');

            if (type === 'success') {
                badge.className = "mb-3 p-3 rounded-lg font-mono text-xs font-bold bg-emerald-950 border-emerald-700 text-emerald-400 border";
                badge.innerText = `🟢 SUCCESS: ${message}`;
                if(bodyText) {
                    decryptBox.classList.remove('hidden');
                    outputText.innerText = bodyText;
                }
            } else if (type === 'info') {
                badge.className = "mb-3 p-3 rounded-lg font-mono text-xs font-bold bg-blue-950 border-blue-700 text-blue-400 border";
                badge.innerText = `ℹ️ INFO: ${message}`;
            } else {
                badge.className = "mb-3 p-3 rounded-lg font-mono text-xs font-bold bg-red-950 border-red-700 text-red-400 border";
                badge.innerText = `🔴 ERROR: ${message}`;
            }
        }

        async function processInput() {
            const input = document.getElementById('main-input').value.trim();
            
            if (!input) {
                showStatus('error', 'Input is empty.');
                return;
            }

            // Route 1: Public Key Detection
            if (input.includes('-----BEGIN PGP PUBLIC KEY BLOCK-----')) {
                try {
                    const readKey = await openpgp.readKey({ armoredKey: input });
                    const keyID = readKey.getKeyID().toHex().toUpperCase();
                    
                    // Simple input prompt for mobile label assignment
                    const name = prompt(`Enter a nickname for Key ID: 0x${keyID}`, "Market/Vendor Key") || `Key_${keyID.substring(0,6)}`;
                    
                    keyRing[keyID] = { armoredKey: input, label: name };
                    localStorage.setItem('pgp_vault_keys', JSON.stringify(keyRing));
                    
                    updateKeyCount();
                    showStatus('success', `Saved Public Key: "${name}" (0x${keyID})`);
                } catch (err) {
                    showStatus('error', `Failed to parse public key: ${err.message}`);
                }
                return;
            }

            // Route 2: Signed Cleartext Message Detection
            if (input.includes('-----BEGIN PGP SIGNED MESSAGE-----')) {
                try {
                    const cleartextMessage = await openpgp.readCleartextMessage({ cleartextMessage: input });
                    const signingKeyIDs = cleartextMessage.getSigningKeyIDs().map(id => id.toHex().toUpperCase());
                    
                    let verificationKey = null;
                    let matchedLabel = "Unknown Signer";
                    
                    // Query local database for signing signature match
                    for (const id of signingKeyIDs) {
                        if (keyRing[id]) {
                            verificationKey = await openpgp.readKey({ armoredKey: keyRing[id].armoredKey });
                            matchedLabel = keyRing[id].label;
                            break;
                        }
                    }

                    if (!verificationKey) {
                        showStatus('error', `Missing verification key. Message was signed by Key ID: 0x${signingKeyIDs[0] || 'Unknown'}. Please import their Public Key first.`);
                        return;
                    }

                    const verificationResult = await openpgp.verify({
                        message: cleartextMessage,
                        verificationKeys: verificationKey
                    });

                    const { verified } = verificationResult.signatures[0];
                    await verified; // Throws error if signature does not compute mathematically

                    showStatus('success', `Valid Signature from "${matchedLabel}"`, cleartextMessage.getText());
                } catch (err) {
                    showStatus('error', `Verification failed: ${err.message}`);
                }
                return;
            }

            showStatus('error', 'Unrecognized PGP block format. Ensure you pasted the headers.');
        }

        // Initialize display state on initial load
        updateKeyCount();
    </script>
</body>
</html>
